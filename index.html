<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Form Registrasi Mahasiswa</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --ink:     #0d0d0d;
      --paper:   #f5f2eb;
      --cream:   #ede9df;
      --accent:  #c8401a;
      --accent2: #1a5fc8;
      --border:  #c4bfb3;
      --mono:    'JetBrains Mono', monospace;
      --sans:    'Sora', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--sans);
      background-color: var(--paper);
      color: var(--ink);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -1;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
    }

    /* HEADER */
    .site-header {
      border-bottom: 2px solid var(--ink);
      background: var(--paper);
      padding: 0 2rem; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .logo { font-size: 1.1rem; font-weight: 800; letter-spacing: -0.02em; text-transform: uppercase; }
    .logo span { color: var(--accent); }
    .badge-week {
      font-family: var(--mono); font-size: 0.65rem;
      background: var(--ink); color: var(--paper);
      padding: 3px 10px; letter-spacing: 0.08em; text-transform: uppercase;
    }

    /* CENTER */
    .center-wrap {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 3rem 2rem; gap: 1.5rem;
    }
    .page-title {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800; letter-spacing: -0.03em; text-align: center;
    }
    .page-title em { font-style: normal; color: var(--accent); border-bottom: 3px solid var(--accent); }

    .btn-register {
      background: var(--accent); color: #fff;
      border: 2px solid var(--accent); padding: 0.85rem 2.5rem;
      font-family: var(--sans); font-weight: 700; font-size: 0.9rem;
      letter-spacing: 0.05em; text-transform: uppercase;
      cursor: pointer; display: inline-flex; align-items: center; gap: 8px;
      transition: all 0.15s; border-radius: 0;
    }
    .btn-register:hover { background: transparent; color: var(--accent); }

    /* MODAL */
    .modal-content {
      border: 2px solid var(--ink); border-radius: 0;
      background: var(--paper); box-shadow: 8px 8px 0 var(--ink);
    }
    .modal-header {
      border-bottom: 2px solid var(--ink); padding: 1.25rem 1.5rem;
      background: var(--ink);
    }
    .modal-title {
      font-family: var(--sans); font-weight: 800; font-size: 1rem;
      color: var(--paper); text-transform: uppercase;
    }
    .btn-close { filter: invert(1); opacity: 0.8; }
    .modal-body { padding: 2rem 1.5rem; }
    .modal-footer { border-top: 1px dashed var(--border); padding: 1rem 1.5rem; }

    /* FORM */
    .form-label {
      font-family: var(--mono); font-size: 0.7rem;
      text-transform: uppercase; letter-spacing: 0.1em;
      font-weight: 700; color: #444; margin-bottom: 6px;
    }
    .form-label .req { color: var(--accent); }
    .form-control {
      border: 2px solid var(--border); border-radius: 0;
      background: #fff; font-family: var(--mono);
      font-size: 0.85rem; padding: 0.6rem 0.9rem; transition: border-color 0.15s;
    }
    .form-control:focus { border-color: var(--accent); box-shadow: none; }
    .form-control.is-invalid { border-color: var(--accent); }
    .invalid-feedback { font-family: var(--mono); font-size: 0.7rem; }

    /* DROP ZONE */
    .drop-zone {
      border: 2px dashed var(--border); padding: 2rem 1rem;
      text-align: center; cursor: pointer; transition: all 0.2s;
      background: var(--cream); position: relative;
    }
    .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: #fdf0ec; }
    .drop-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .dz-icon { font-size: 2rem; color: var(--border); margin-bottom: 0.4rem; }
    .dz-text { font-family: var(--mono); font-size: 0.75rem; color: #888; }
    .dz-text strong { color: var(--accent); }

    /* PREVIEW */
    .preview-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(88px, 1fr));
      gap: 10px; margin-top: 1rem;
    }
    .preview-item {
      position: relative; border: 2px solid var(--border);
      background: var(--cream); overflow: hidden; animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
    .preview-item img { width: 100%; height: 80px; object-fit: cover; display: block; }
    .preview-item .rm {
      position: absolute; top: 2px; right: 2px;
      background: var(--accent); color: #fff; border: none;
      width: 20px; height: 20px; font-size: 0.6rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .preview-item .fn {
      font-family: var(--mono); font-size: 0.6rem; color: #666;
      padding: 3px 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .file-badge {
      font-family: var(--mono); font-size: 0.7rem;
      background: var(--ink); color: var(--paper);
      padding: 2px 8px; display: inline-block; margin-top: 8px;
    }

    /* BUTTONS */
    .btn-submit {
      background: var(--accent); color: #fff;
      border: 2px solid var(--accent); padding: 0.75rem 2rem;
      font-family: var(--sans); font-weight: 700; font-size: 0.85rem;
      letter-spacing: 0.05em; text-transform: uppercase;
      border-radius: 0; width: 100%; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.15s;
    }
    .btn-submit:hover:not(:disabled) { background: #a33215; border-color: #a33215; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn-cancel {
      background: transparent; border: 2px solid var(--border);
      padding: 0.75rem 1.5rem; font-family: var(--mono);
      font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;
      cursor: pointer; border-radius: 0; transition: all 0.15s;
    }
    .btn-cancel:hover { border-color: var(--ink); }

    /* RESULT */
    #resultPanel { display: none; margin-top: 1.5rem; }

    .result-status {
      display: flex; align-items: center; gap: 10px;
      padding: 0.85rem 1.1rem; margin-bottom: 1rem;
      font-family: var(--mono); font-weight: 700;
      font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.08em;
      border: 2px solid;
    }
    .result-status.sukses { border-color: #1a8a4a; background: #e6f7ed; color: #1a8a4a; }
    .result-status.gagal  { border-color: var(--accent); background: #fdf0ec; color: var(--accent); }

    .result-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1px; border: 1px solid var(--border); background: var(--border); margin-bottom: 1rem;
    }
    .rc { background: #fff; padding: 0.75rem 1rem; }
    .rc.full { grid-column: 1/-1; }
    .rc-label { font-family: var(--mono); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: #888; margin-bottom: 4px; }
    .rc-value { font-family: var(--mono); font-size: 0.85rem; font-weight: 700; color: var(--ink); word-break: break-all; }

    .foto-list { list-style: none; padding: 0; margin: 0; }
    .foto-list li {
      font-family: var(--mono); font-size: 0.72rem; color: var(--accent2);
      padding: 3px 0; border-bottom: 1px dashed var(--border);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .foto-list li:last-child { border-bottom: none; }

    .sec-label {
      font-family: var(--mono); font-size: 0.62rem;
      text-transform: uppercase; letter-spacing: 0.12em; color: #888;
      margin-bottom: 0.5rem; margin-top: 1rem;
      display: flex; align-items: center; gap: 8px;
    }
    .sec-label::after { content:''; flex:1; height:1px; background:var(--border); }

    .xml-raw {
      background: var(--ink); color: #79c0ff;
      font-family: var(--mono); font-size: 0.7rem;
      padding: 1rem; line-height: 1.8; overflow: auto;
      max-height: 180px; border-left: 3px solid var(--accent2);
    }

    /* LOADING */
    .loading-overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(245,242,235,0.88); z-index: 10;
      align-items: center; justify-content: center; flex-direction: column; gap: 10px;
    }
    .loading-overlay.active { display: flex; }
    .loader {
      width: 34px; height: 34px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-txt { font-family: var(--mono); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: #666; }

    footer {
      border-top: 1px solid var(--border); padding: 1rem 2rem;
      text-align: center; font-family: var(--mono); font-size: 0.62rem; color: #aaa;
    }
  </style>
</head>
<body>


  <div class="center-wrap">
    <h1 class="page-title">Registrasi <em>Mahasiswa</em></h1>
    <button class="btn-register" data-bs-toggle="modal" data-bs-target="#modalRegistrasi">
      <i class="bi bi-person-plus-fill"></i> Daftarkan Mahasiswa
    </button>
  </div>

  <div class="container mb-5" style="max-width: 900px;">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 style="font-family: var(--sans); font-weight: 800; font-size: 1.2rem; margin: 0;">Data Terdaftar</h4>
      <button class="btn btn-sm btn-outline-dark" onclick="loadData()" style="font-family: var(--mono); font-size: 0.75rem; border-radius: 0;">
        <i class="bi bi-arrow-clockwise"></i> Refresh
      </button>
    </div>
    
    <div class="table-responsive bg-white" style="border: 2px solid var(--ink); box-shadow: 6px 6px 0 var(--ink);">
      <table class="table table-hover mb-0" style="font-family: var(--mono); font-size: 0.85rem;" id="tabelMahasiswa">
        <thead class="table-dark" style="border-bottom: 2px solid var(--ink);">
          <tr>
            <th class="py-3 px-3" style="width: 50px;">No</th>
            <th class="py-3 px-3" style="width: 80px;">Foto</th>
            <th class="py-3 px-3">NIK</th>
            <th class="py-3 px-3">Nama Lengkap</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="4" class="text-center py-4 text-muted">Memuat data</td></tr>
        </tbody>
      </table>
    </div>
  </div>



  <div class="modal fade" id="modalRegistrasi" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
      <div class="modal-content">

        <div class="loading-overlay" id="loadingOverlay">
          <div class="loader"></div>
          <span class="loader-txt">Mengirim data</span>
        </div>

        <div class="modal-header">
          <h5 class="modal-title" id="modalLabel">
            <i class="bi bi-person-badge me-2"></i>Form Registrasi Mahasiswa
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <form id="formReg" novalidate>

            <div class="mb-4">
              <label class="form-label" for="inputNIK">NIK <span class="req">*</span></label>
              <input type="text" class="form-control" id="inputNIK" name="nik"
                     placeholder="Contoh: 2024001234" maxlength="20" required autocomplete="off"/>
        
            </div>

            <div class="mb-4">
              <label class="form-label" for="inputNama">Nama Lengkap <span class="req">*</span></label>
              <input type="text" class="form-control" id="inputNama" name="nama"
                     placeholder="Nama sesuai KTP / kartu mahasiswa" maxlength="150" required autocomplete="off"/>
            </div>

            <div class="mb-4">
              <label class="form-label">
                Foto <span class="req">*</span>
                <span style="font-weight:400;text-transform:none;letter-spacing:0;font-size:0.7rem;color:#888;">
                </span>
              </label>
              <div class="drop-zone" id="dropZone">
                <input type="file" id="inputFoto" name="foto[]" accept=".jpg,.jpeg,image/jpeg" multiple/>
                <div class="dz-icon"><i class="bi bi-cloud-arrow-up"></i></div>
                <div class="dz-text">
                  <strong>Klik untuk pilih</strong> atau seret &amp; lepas<br>
                </div>
              </div>
              <div id="fileCounter" style="display:none;">
                <span class="file-badge" id="fileBadge">0 file dipilih</span>
              </div>
              <div class="preview-grid" id="previewGrid"></div>
              <div class="invalid-feedback d-block" id="fotoError" style="display:none!important;"></div>
            </div>

            <div id="resultPanel">
              <div class="sec-label">Hasil Submit</div>

              <div class="result-status" id="resStatus">
                <i class="bi" id="resIcon"></i>
                <span id="resStatusTxt"></span>
              </div>

              <div class="result-grid" id="resGrid" style="display:none;">
                <div class="rc">
                  <div class="rc-label">NIK</div>
                  <div class="rc-value" id="resNIK">—</div>
                </div>
                <div class="rc">
                  <div class="rc-label">Nama</div>
                  <div class="rc-value" id="resNama">—</div>
                </div>
                <div class="rc full">
                  <div class="rc-label">URL Foto</div>
                  <ul class="foto-list" id="resFotoList"></ul>
                </div>
              </div>

              <div class="sec-label">Raw XML Response</div>
              <div class="xml-raw" id="xmlRaw"></div>
            </div>

          </form>
        </div>

        <div class="modal-footer d-flex gap-2">
          <button type="button" class="btn-cancel" data-bs-dismiss="modal">Batal</button>
          <button type="button" class="btn-submit" id="btnSubmit" onclick="submitForm()">
            <i class="bi bi-send-fill"></i> Submit Data
          </button>
        </div>

      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
</body>
</html>
